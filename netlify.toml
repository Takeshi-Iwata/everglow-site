# Netlify ビルド設定
# microCMS の記事を取得して静的HTMLを生成し、ルートを公開する。
# 環境変数（Netlify管理画面 → Site settings → Environment variables）に
#   MICROCMS_SERVICE_DOMAIN = everglow
#   MICROCMS_ENDPOINT       = news
#   MICROCMS_API_KEY        = （再発行したキー）
# を設定すること（.env はリポジトリに含めない）。

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# 予約API（サーバーレス関数）。Supabase接続は環境変数で設定:
#   SUPABASE_URL / SUPABASE_SECRET_KEY
#   （任意で RESEND_API_KEY / RESERVATION_FROM / SALON_EMAIL ＝確認メール用）
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
